[metadata]
name = "tldr"
description = "Browse and preview TLDR help pages for command-line tools"
requirements = ["tldr"]

[source]
command = "tldr --list"
output = "{split: :0}"

[preview]
command = "tldr '{0}'"

[ui]
layout = "landscape"

[keybindings]
ctrl-o = "actions:open"

[actions.open]
description = "Open the selected TLDR page"
command = "tldr '{0}'"
mode = "execute"
